<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Files</title></head>
<body>
  <h1>Files</h1>
  <a id="dl" download="report.txt" href="data:text/plain,browserhand-report-ok">Download report</a>
  <label>Attachment <input type="file" id="upl" aria-label="Attachment"></label>
  <p id="status">no file</p>
  <script>
    document.getElementById('upl').addEventListener('change', (e) => {
      const f = e.target.files[0];
      document.getElementById('status').textContent = f ? 'uploaded ' + f.name : 'no file';
    });
  </script>
</body>
</html>
