<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Sign in</title></head>
<body>
  <h1>Sign in</h1>
  <form>
    <label>Username <input aria-label="Username" id="user" name="user"></label>
    <label>Password <input aria-label="Password" type="password" id="pass" name="pass"></label>
    <button type="button" id="signin"
      onclick="document.getElementById('out').textContent = (user.value === 'jonas' ? 'Welcome, jonas' : 'Access denied')">
      Sign in
    </button>
  </form>
  <p id="out"></p>
</body>
</html>
